<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHΔDØW | PINK TITAN 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;900&display=swap');
        
        :root { --primary: #ff007f; --secondary: #ff85c0; --bg: #0a0005; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; overflow: hidden; height: 100vh; }

        .hero-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a000d 0%, #000 100%); }
        
        .titan-grid { display: grid; grid-template-columns: 100px 320px 1fr 320px; height: 100vh; gap: 0; }

        @media (max-width: 1200px) {
            .titan-grid { grid-template-columns: 1fr; height: 100vh; display: flex; flex-direction: column; }
            .glass-sidebar { flex-direction: row !important; width: 100%; height: 60px !important; padding: 0 20px !important; justify-content: space-between !important; position: absolute; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,192,203,0.1); }
            .logo-vertical { writing-mode: horizontal-tb !important; margin-bottom: 0 !important; font-size: 16px !important; }
            .glass-sidebar .flex-col { flex-direction: row !important; gap: 15px !important; }
            .btn-glow { width: 40px !important; height: 40px !important; border-radius: 12px !important; }
            .main-display { padding: 0 !important; margin-top: 60px; height: calc(100vh - 60px) !important; }
            .glass-panel { display: none !important; }
        }

        .glass-sidebar { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(50px); border-left: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; padding: 40px 0; }
        .glass-panel { background: rgba(10, 0, 5, 0.6); backdrop-filter: blur(30px); border-right: 1px solid rgba(255,255,255,0.05); padding: 25px; display: flex; flex-direction: column; }

        .main-display { 
            padding: 0; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
            height: 100vh;
        }
        .main-display::-webkit-scrollbar { display: none; }

        .video-container { 
            width: 100%; 
            height: 100%; 
            scroll-snap-align: start; 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #000;
        }

        .titan-card { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
        }
        
        .watermark { position: absolute; top: 20px; right: 20px; font-family: 'Orbitron'; font-size: 12px; font-weight: 900; color: var(--primary); opacity: 0.6; pointer-events: none; z-index: 5; }
        
        video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        .interaction-side { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 25px; align-items: center; z-index: 10; }
        .action-btn { background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); width: 50px; height: 50px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,0,127,0.2); }
        .action-btn:hover { background: var(--primary); color: #fff; }
        .action-btn span { font-size: 11px; font-weight: bold; margin-top: 4px; }

        .card-overlay { position: absolute; left: 20px; bottom: 30px; width: 70%; pointer-events: none; z-index: 10; }
        .user-tag { color: var(--primary); font-weight: 900; font-size: 16px; margin-bottom: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        .btn-glow { background: rgba(255,255,255,0.03); width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,0,127,0.1); transition: 0.3s; }
        .btn-glow:hover { border-color: var(--primary); box-shadow: 0 0 15px rgba(255, 0, 127, 0.3); color: var(--primary); }
        
        .upload-giant { background: linear-gradient(45deg, var(--primary), #ff66b2); color: #fff; font-family: 'Orbitron'; font-weight: 900; padding: 18px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.4s; box-shadow: 0 10px 20px rgba(255, 0, 127, 0.2); width: 100%; }
        
        .logo-vertical { font-family: 'Orbitron'; font-weight: 900; font-size: 20px; letter-spacing: 5px; writing-mode: vertical-rl; color: var(--primary); text-shadow: 0 0 15px var(--primary); }
        
        .pink-text { color: var(--primary); }
        .pink-border { border-color: var(--primary); }
        .pink-bg { background-color: var(--primary); }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="titan-grid">
        <aside class="glass-sidebar">
            <div class="logo-vertical mb-20">SHΔDØW</div>
            <div class="flex flex-col gap-8">
                <div class="btn-glow" title="Home" onclick="openAd()"><i class="fas fa-home text-xl"></i></div>
                <div class="btn-glow" title="Trending" onclick="openAd()"><i class="fas fa-fire text-xl text-orange-500"></i></div>
                <div class="btn-glow" title="VIP" onclick="openAd()"><i class="fas fa-crown text-xl text-yellow-500"></i></div>
                <div class="btn-glow" title="Safety" onclick="openAd()"><i class="fas fa-shield-halved text-xl"></i></div>
            </div>
        </aside>

        <section class="glass-panel">
            <div class="mb-8">
                <h3 class="text-[10px] font-[Orbitron] opacity-40 mb-3 tracking-widest">SYSTEM_LIVE</h3>
                <div class="flex items-center gap-3 bg-white/5 p-4 rounded-2xl border border-white/10">
                    <div class="w-2 h-2 rounded-full bg-pink-500 animate-pulse"></div>
                    <span class="text-[10px] font-bold tracking-tighter">CORE_PINK_CONNECTED</span>
                </div>
            </div>

            <div class="space-y-6 flex-1">
                <h3 class="text-[10px] font-[Orbitron] opacity-40 tracking-widest uppercase text-pink-500">Global Chat</h3>
                <div id="mini-chat" class="space-y-4 h-[250px] overflow-y-auto pr-2 opacity-80 text-[11px]"></div>
                <div class="flex gap-2">
                    <input id="chat-input" type="text" placeholder="أرسل رسالة..." class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-xs outline-none focus:border-pink-500">
                    <button onclick="sendMessage()" class="bg-pink-600 text-white px-4 rounded-xl text-xs font-bold">إرسال</button>
                </div>
            </div>

            <div class="mt-8">
                <div class="upload-giant" id="mega-upload">
                    <i class="fas fa-plus-circle mr-2"></i> UPLOAD_TITAN
                </div>
            </div>
        </section>

        <main class="main-display" id="video-feed">
            </main>

        <section class="glass-panel border-r-0 border-l border-white/5">
            <h3 class="text-[10px] font-[Orbitron] opacity-40 mb-6 uppercase">Leaderboard</h3>
            <div class="space-y-4">
                <div class="p-5 bg-white/5 rounded-3xl border border-white/5" onclick="openAd()">
                    <div class="text-[9px] opacity-50 mb-1">TOTAL_TRAFFIC</div>
                    <div class="text-xl font-black text-pink-500">9.2 TB/s</div>
                </div>
                <div class="p-5 bg-white/5 rounded-3xl border border-white/5">
                    <div class="text-[9px] opacity-50 mb-1">ACTIVE_CORES</div>
                    <div class="text-xl font-black">24,110</div>
                </div>
                <div id="user-id" class="p-4 bg-pink-500/10 rounded-2xl border border-pink-500/20 text-center text-[10px] font-bold tracking-widest text-pink-400">ID: ----</div>
            </div>
        </section>
    </div>

    <script>
        const SHADOW_ID = localStorage.getItem('shadow_uid') || 'U_' + Math.random().toString(36).substr(2, 5).toUpperCase();
        localStorage.setItem('shadow_uid', SHADOW_ID);
        document.getElementById('user-id').innerText = `ID: ${SHADOW_ID}`;

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const AD_LINKS = [
            "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e",
            "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c",
            "https://www.effectivegatecpm.com/q7bf96ad4p?key=4272e67963ce67f1cfaeb4a56682d6ec",
            "https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d"
        ];
        
        let adToggle = 0;
        function openAd() {
            window.open(AD_LINKS[adToggle], '_blank');
            adToggle = (adToggle + 1) % AD_LINKS.length;
        }

        const CLOUD_NAME = "dssk5tabb", UPLOAD_PRESET = "bjebvo5p";
        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: CLOUD_NAME, 
            uploadPreset: UPLOAD_PRESET,
            clientAllowedFormats: ["mp4", "mov", "webm"]
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ 
                    url: res.info.secure_url, 
                    sender: SHADOW_ID, 
                    likes: 0, 
                    shares: 0,
                    timestamp: Date.now() 
                });
            }
        });
        document.getElementById("mega-upload").onclick = () => { myWidget.open(); };

        db.ref('videos').on('value', (snapshot) => {
            const feed = document.getElementById('video-feed');
            const data = snapshot.val();
            feed.innerHTML = '';
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const vid = data[id];
                const container = document.createElement('div');
                container.className = 'video-container';
                container.innerHTML = `
                    <div class="titan-card">
                        <div class="watermark">SHΔDØW TITAN</div>
                        <video loop muted playsinline src="${vid.url}" onclick="togglePlay(this)"></video>
                        
                        <div class="interaction-side">
                            <div class="action-btn" onclick="likeVideo('${id}')">
                                <i class="fas fa-heart"></i>
                                <span>${vid.likes || 0}</span>
                            </div>
                            <div class="action-btn" onclick="shareVideo('${id}')">
                                <i class="fas fa-share"></i>
                                <span>${vid.shares || 0}</span>
                            </div>
                            <div class="action-btn" onclick="openAd()">
                                <i class="fas fa-ellipsis-v"></i>
                            </div>
                        </div>

                        <div class="card-overlay">
                            <div class="user-tag">@${vid.sender}</div>
                            <p class="text-xs opacity-80">SHΔDØW ENCRYPTED FEED</p>
                        </div>
                    </div>
                `;
                feed.appendChild(container);
            });
            initAutoPlay();
        });

        function initAutoPlay() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play().catch(e => {});
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.8 });

            document.querySelectorAll('.video-container').forEach(v => observer.observe(v));
        }

        function togglePlay(v) { 
            if (v.paused) {
                v.play();
                v.muted = false;
            } else {
                v.pause();
            }
        }

        function likeVideo(id) {
            openAd();
            db.ref(`videos/${id}`).transaction(p => { if(p) p.likes = (p.likes || 0) + 1; return p; });
        }

        function shareVideo(id) {
            openAd();
            navigator.clipboard.writeText(window.location.href).then(() => alert("تم نسخ الرابط!"));
            db.ref(`videos/${id}`).transaction(p => { if(p) p.shares = (p.shares || 0) + 1; return p; });
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            if(input.value.trim() !== '') {
                db.ref('global_chat').push({ user: SHADOW_ID.split('_')[1], text: input.value });
                input.value = '';
            }
        }

        db.ref('global_chat').limitToLast(15).on('value', s => {
            const chat = document.getElementById('mini-chat');
            chat.innerHTML = '';
            const val = s.val();
            if(val) Object.values(val).forEach(m => {
                const msg = document.createElement('div');
                msg.className = 'p-3 bg-white/5 rounded-xl border-r-2 border-pink-500';
                msg.innerHTML = `<span class="text-pink-500 font-black block">${m.user}</span> ${m.text}`;
                chat.appendChild(msg);
            });
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
