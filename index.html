<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHΔDØW | THE ULTIMATE TITAN 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;900&display=swap');
        
        :root { --primary: #ff0055; --secondary: #00f3ff; --bg: #020202; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; overflow: hidden; height: 100vh; margin: 0; }

        .hero-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a0a11 0%, #000 100%); }
        
        .titan-grid { display: grid; grid-template-columns: 100px 320px 1fr 320px; height: 100vh; gap: 0; }

        @media (max-width: 1200px) {
            .titan-grid { grid-template-columns: 1fr; height: 100vh; display: flex; flex-direction: column; }
            .glass-sidebar { display: none !important; }
            .glass-panel { display: none !important; }
            .main-display { height: 100vh !important; width: 100vw !important; }
        }

        .glass-sidebar { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(50px); border-left: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; padding: 40px 0; }
        .glass-panel { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(30px); border-right: 1px solid rgba(255,255,255,0.05); padding: 25px; display: flex; flex-direction: column; }

        .main-display { 
            height: 100vh; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .main-display::-webkit-scrollbar { display: none; }

        .video-grid { display: flex; flex-direction: column; width: 100%; }

        .titan-card { 
            position: relative; 
            width: 100%; 
            height: 100vh; 
            scroll-snap-align: start; 
            scroll-snap-stop: always;
            background: #000; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .watermark { position: absolute; top: 20px; right: 20px; font-family: 'Orbitron'; font-size: 14px; font-weight: 900; color: rgba(255,255,255,0.4); pointer-events: none; z-index: 10; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
        
        video { width: 100%; height: 100%; object-fit: cover; background: #000; cursor: pointer; }

        .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 30%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 30px; pointer-events: none; z-index: 5; }

        .interaction-side { position: absolute; left: 20px; bottom: 100px; display: flex; flex-direction: column; gap: 25px; align-items: center; z-index: 15; }
        .action-btn { background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); width: 55px; height: 55px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid rgba(255,255,255,0.1); pointer-events: auto; }
        .action-btn:hover { transform: scale(1.1); background: var(--primary); border-color: white; }
        .action-btn i { font-size: 20px; }
        .action-btn span { font-size: 11px; font-weight: bold; margin-top: 4px; }

        .btn-glow { background: rgba(255,255,255,0.05); width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .btn-glow:hover { border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }
        .upload-giant { background: linear-gradient(45deg, var(--primary), #ff0095); color: #fff; font-family: 'Orbitron'; font-weight: 900; padding: 18px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.4s; box-shadow: 0 10px 20px rgba(255, 0, 85, 0.2); width: 100%; }
        
        .logo-vertical { font-family: 'Orbitron'; font-weight: 900; font-size: 20px; letter-spacing: 5px; writing-mode: vertical-rl; color: var(--primary); text-shadow: 0 0 15px var(--primary); }
    
        .text-pink-primary { color: #ff0055 !important; }
        .bg-pink-primary { background-color: #ff0055 !important; }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="titan-grid">
        <aside class="glass-sidebar">
            <div class="logo-vertical mb-20">SHΔDØW</div>
            <div class="flex flex-col gap-8">
                <div class="btn-glow" title="Home" onclick="openAd()"><i class="fas fa-home text-xl"></i></div>
                <div class="btn-glow" title="Trending" onclick="openAd()"><i class="fas fa-fire text-xl text-orange-500"></i></div>
                <div class="btn-glow" title="VIP" onclick="openAd()"><i class="fas fa-crown text-xl text-yellow-500"></i></div>
                <div class="btn-glow" title="Safety" onclick="openAd()"><i class="fas fa-shield-halved text-xl"></i></div>
            </div>
        </aside>

        <section class="glass-panel">
            <div class="mb-8">
                <h3 class="text-[10px] font-[Orbitron] opacity-40 mb-3 tracking-widest">SYSTEM_LIVE</h3>
                <div class="flex items-center gap-3 bg-white/5 p-4 rounded-2xl border border-white/10">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-[10px] font-bold tracking-tighter">CORE_TITAN_CONNECTED</span>
                </div>
            </div>

            <div class="space-y-6 flex-1">
                <h3 class="text-[10px] font-[Orbitron] opacity-40 tracking-widest uppercase">Global Chat</h3>
                <div id="mini-chat" class="space-y-4 h-[250px] overflow-y-auto pr-2 opacity-80 text-[11px]"></div>
                <div class="flex gap-2">
                    <input id="chat-input" type="text" placeholder="أرسل رسالة..." class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-xs outline-none focus:border-pink-500">
                    <button onclick="sendMessage()" class="bg-pink-primary text-white px-4 rounded-xl text-xs font-bold">إرسال</button>
                </div>
            </div>

            <div class="mt-8">
                <div class="upload-giant" id="mega-upload">
                    <i class="fas fa-plus-circle mr-2"></i> UPLOAD_TITAN
                </div>
            </div>
        </section>

        <main class="main-display" id="main-scroller">
            <div class="video-grid" id="titan-grid"></div>
        </main>

        <section class="glass-panel border-r-0 border-l border-white/5">
            <h3 class="text-[10px] font-[Orbitron] opacity-40 mb-6 uppercase">Leaderboard</h3>
            <div class="space-y-4">
                <div class="p-5 bg-white/5 rounded-3xl border border-white/5" onclick="openAd()">
                    <div class="text-[9px] opacity-50 mb-1">TOTAL_TRAFFIC</div>
                    <div class="text-xl font-black text-pink-primary">4.8 TB/s</div>
                </div>
                <div class="p-5 bg-white/5 rounded-3xl border border-white/5">
                    <div class="text-[9px] opacity-50 mb-1">ACTIVE_CORES</div>
                    <div class="text-xl font-black">12,840</div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const SHADOW_ID = localStorage.getItem('shadow_uid') || 'U_' + Math.random().toString(36).substr(2, 5).toUpperCase();
        localStorage.setItem('shadow_uid', SHADOW_ID);

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const AD_LINKS = [
            "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e",
            "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c",
            "https://www.effectivegatecpm.com/q7bf96ad4p?key=4272e67963ce67f1cfaeb4a56682d6ec",
            "https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d"
        ];
        
        let adToggle = 0;
        function openAd() {
            window.open(AD_LINKS[adToggle], '_blank');
            adToggle = (adToggle + 1) % AD_LINKS.length;
        }

        const CLOUD_NAME = "dssk5tabb", UPLOAD_PRESET = "bjebvo5p";
        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: CLOUD_NAME, 
            uploadPreset: UPLOAD_PRESET,
            clientAllowedFormats: ["mp4", "mov", "webm"]
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ 
                    url: res.info.secure_url, 
                    sender: SHADOW_ID, 
                    likes: 0, 
                    shares: 0,
                    timestamp: Date.now() 
                });
            }
        });
        document.getElementById("mega-upload").onclick = () => { myWidget.open(); };

        db.ref('videos').on('value', (snapshot) => {
            const grid = document.getElementById('titan-grid');
            const data = snapshot.val();
            grid.innerHTML = '';
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const vid = data[id];
                const card = document.createElement('div');
                card.className = 'titan-card';
                card.innerHTML = `
                    <div class="watermark">SHΔDØW TITAN</div>
                    <video loop muted playsinline src="${vid.url}" onclick="togglePlay(this)"></video>
                    
                    <div class="interaction-side">
                        <div class="action-btn" onclick="likeVideo('${id}')">
                            <i class="fas fa-heart text-white"></i>
                            <span class="text-white">${vid.likes || 0}</span>
                        </div>
                        <div class="action-btn" onclick="shareVideo('${id}')">
                            <i class="fas fa-share text-white"></i>
                            <span class="text-white">${vid.shares || 0}</span>
                        </div>
                    </div>

                    <div class="card-overlay">
                        <div class="text-lg font-black text-pink-primary mb-1">@${vid.sender}</div>
                        <div class="text-[10px] opacity-60 font-[Orbitron]">ENCRYPTED_TITAN_STREAM</div>
                    </div>
                `;
                grid.appendChild(card);
            });
            initAutoPlay();
        });

        function initAutoPlay() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play().catch(e => {});
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.6 });

            document.querySelectorAll('.titan-card').forEach(card => observer.observe(card));
        }

        function togglePlay(v) { 
            if (v.paused) {
                v.play();
                v.muted = false;
            } else {
                v.pause();
            }
        }

        function likeVideo(id) {
            openAd();
            db.ref(`videos/${id}`).transaction(p => { if(p) p.likes = (p.likes || 0) + 1; return p; });
        }

        function shareVideo(id) {
            openAd();
            navigator.clipboard.writeText(window.location.href).then(() => alert("تم نسخ الرابط!"));
            db.ref(`videos/${id}`).transaction(p => { if(p) p.shares = (p.shares || 0) + 1; return p; });
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            if(input.value.trim() !== '') {
                db.ref('global_chat').push({ user: SHADOW_ID.split('_')[1], text: input.value });
                input.value = '';
            }
        }

        db.ref('global_chat').limitToLast(15).on('value', s => {
            const chat = document.getElementById('mini-chat');
            chat.innerHTML = '';
            const val = s.val();
            if(val) Object.values(val).forEach(m => {
                const msg = document.createElement('div');
                msg.className = 'p-3 bg-white/5 rounded-xl border-r-2 border-pink-500';
                msg.innerHTML = `<span class="text-pink-primary font-black block">${m.user}</span> ${m.text}`;
                chat.appendChild(msg);
            });
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
