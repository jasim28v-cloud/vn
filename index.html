<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHΔDØW | PINK TITAN 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;900&display=swap');
        
        :root { --primary: #ff007f; --secondary: #ff0055; --bg: #050005; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; overflow: hidden; height: 100vh; }

        .hero-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a0a14 0%, #000 100%); }
        
        .titan-grid { display: grid; grid-template-columns: 80px 300px 1fr; height: 100vh; gap: 0; }

        /* تصفح نمط تيك توك */
        .main-display { 
            height: 100vh; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
            scroll-behavior: smooth;
        }
        .main-display::-webkit-scrollbar { display: none; }

        .titan-card { 
            position: relative; 
            height: 100vh; 
            width: 100%; 
            max-width: 500px;
            margin: 0 auto;
            background: #000; 
            scroll-snap-align: start;
            overflow: hidden; 
        }
        
        .watermark { position: absolute; top: 20px; right: 20px; font-family: 'Orbitron'; font-size: 12px; font-weight: 900; color: rgba(255,255,255,0.3); z-index: 5; }
        
        video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        .interaction-side { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 25px; align-items: center; z-index: 10; }
        .action-btn { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); width: 50px; height: 50px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,0,127,0.3); }
        .action-btn:hover { background: var(--primary); color: #fff; box-shadow: 0 0 15px var(--primary); }
        .action-btn span { font-size: 11px; font-weight: bold; margin-top: 2px; }

        .card-info { position: absolute; bottom: 30px; left: 20px; right: 80px; z-index: 10; pointer-events: none; }
        .card-info h3 { color: var(--primary); font-weight: 900; text-shadow: 0 0 10px rgba(255,0,127,0.5); }

        .glass-sidebar { background: rgba(0, 0, 0, 0.8); border-left: 1px solid rgba(255,0,127,0.1); display: flex; flex-direction: column; align-items: center; padding: 30px 0; }
        .glass-panel { background: rgba(15, 0, 10, 0.6); backdrop-filter: blur(30px); border-right: 1px solid rgba(255,0,127,0.1); padding: 25px; display: flex; flex-direction: column; }

        .btn-glow { background: rgba(255,255,255,0.03); width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; color: #ff007f; }
        .btn-glow:hover { background: var(--primary); color: #fff; box-shadow: 0 0 20px var(--primary); }
        
        .upload-giant { background: linear-gradient(45deg, var(--primary), #ff00ff); color: #fff; font-family: 'Orbitron'; font-weight: 900; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.4s; box-shadow: 0 5px 15px rgba(255, 0, 127, 0.3); width: 100%; }
        
        .logo-vertical { font-family: 'Orbitron'; font-weight: 900; font-size: 18px; writing-mode: vertical-rl; color: var(--primary); text-shadow: 0 0 15px var(--primary); }

        @media (max-width: 800px) {
            .titan-grid { grid-template-columns: 1fr; }
            .glass-sidebar, .glass-panel { display: none; }
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="titan-grid">
        <aside class="glass-sidebar">
            <div class="logo-vertical mb-20">SHΔDØW PINK</div>
            <div class="flex flex-col gap-6">
                <div class="btn-glow" title="Home"><i class="fas fa-home"></i></div>
                <div class="btn-glow" title="VIP"><i class="fas fa-crown"></i></div>
            </div>
        </aside>

        <section class="glass-panel">
            <div class="mb-8">
                <h3 class="text-[10px] font-[Orbitron] text-pink-500 opacity-60 mb-3 tracking-widest">SYSTEM_LIVE</h3>
                <div class="flex items-center gap-3 bg-pink-500/5 p-4 rounded-2xl border border-pink-500/20">
                    <div class="w-2 h-2 rounded-full bg-pink-500 animate-pulse"></div>
                    <span class="text-[10px] font-bold">PINK_TITAN_ONLINE</span>
                </div>
            </div>

            <div class="space-y-6 flex-1 overflow-hidden flex flex-col">
                <h3 class="text-[10px] font-[Orbitron] opacity-40 tracking-widest uppercase">Global Chat</h3>
                <div id="mini-chat" class="space-y-4 flex-1 overflow-y-auto pr-2 text-[11px]"></div>
                <div class="flex flex-col gap-2">
                    <input id="chat-input" type="text" placeholder="قل شيئاً..." class="w-full bg-white/5 border border-pink-500/20 rounded-xl p-3 text-xs outline-none focus:border-pink-500">
                    <button onclick="sendMessage()" class="upload-giant !p-2 !text-xs">إرسال</button>
                </div>
            </div>

            <div class="mt-8">
                <div class="upload-giant" id="mega-upload">
                    <i class="fas fa-cloud-upload-alt mr-2"></i> UPLOAD
                </div>
            </div>
        </section>

        <main class="main-display" id="titan-grid">
            </main>
    </div>

    <script>
        const SHADOW_ID = localStorage.getItem('shadow_uid') || 'U_' + Math.random().toString(36).substr(2, 5).toUpperCase();
        localStorage.setItem('shadow_uid', SHADOW_ID);

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const AD_LINKS = [
            "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e",
            "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c"
        ];
        
        let adToggle = 0;
        function openAd() {
            window.open(AD_LINKS[adToggle], '_blank');
            adToggle = (adToggle + 1) % AD_LINKS.length;
        }

        const CLOUD_NAME = "dssk5tabb", UPLOAD_PRESET = "bjebvo5p";
        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: CLOUD_NAME, 
            uploadPreset: UPLOAD_PRESET
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ 
                    url: res.info.secure_url, 
                    sender: SHADOW_ID, 
                    likes: 0, 
                    shares: 0,
                    timestamp: Date.now() 
                });
            }
        });
        document.getElementById("mega-upload").onclick = () => { myWidget.open(); };

        db.ref('videos').on('value', (snapshot) => {
            const grid = document.getElementById('titan-grid');
            const data = snapshot.val();
            grid.innerHTML = '';
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const vid = data[id];
                const card = document.createElement('div');
                card.className = 'titan-card';
                card.innerHTML = `
                    <div class="watermark">PINK SHΔDØW</div>
                    <video loop playsinline src="${vid.url}" onclick="togglePlay(this)"></video>
                    
                    <div class="interaction-side">
                        <div class="action-btn" onclick="likeVideo('${id}')">
                            <i class="fas fa-heart"></i>
                            <span>${vid.likes || 0}</span>
                        </div>
                        <div class="action-btn" onclick="shareVideo('${id}')">
                            <i class="fas fa-share"></i>
                            <span>${vid.shares || 0}</span>
                        </div>
                    </div>

                    <div class="card-info">
                        <h3 class="text-lg font-black mb-1">@${vid.sender.split('_')[1]}</h3>
                        <p class="text-xs opacity-70">تم الرفع بواسطة نظام Shadow Pink</p>
                    </div>
                `;
                grid.appendChild(card);
            });
            initAutoPlay();
        });

        function initAutoPlay() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play().catch(e => {});
                        video.muted = false;
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.8 });

            document.querySelectorAll('.titan-card').forEach(card => observer.observe(card));
        }

        function togglePlay(v) { 
            v.paused ? v.play() : v.pause();
        }

        function likeVideo(id) {
            openAd();
            db.ref(`videos/${id}`).transaction(p => { if(p) p.likes = (p.likes || 0) + 1; return p; });
        }

        function shareVideo(id) {
            openAd();
            navigator.clipboard.writeText(window.location.href);
            db.ref(`videos/${id}`).transaction(p => { if(p) p.shares = (p.shares || 0) + 1; return p; });
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            if(input.value.trim() !== '') {
                db.ref('global_chat').push({ user: SHADOW_ID.split('_')[1], text: input.value });
                input.value = '';
            }
        }

        db.ref('global_chat').limitToLast(15).on('value', s => {
            const chat = document.getElementById('mini-chat');
            chat.innerHTML = '';
            const val = s.val();
            if(val) Object.values(val).forEach(m => {
                const msg = document.createElement('div');
                msg.className = 'p-3 bg-pink-500/5 rounded-xl border-r-2 border-pink-500';
                msg.innerHTML = `<span class="text-pink-400 font-black block">${m.user}</span> ${m.text}`;
                chat.appendChild(msg);
            });
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
