<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINK VIBE | FUTURE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+Arabic:wght@400;900&display=swap');
        :root { --pink: #ff007a; }
        body { background: #000; color: #fff; font-family: 'Noto+Sans+Arabic', sans-serif; margin: 0; overflow: hidden; }
        .pink-glow { text-shadow: 0 0 15px var(--pink); font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 0, 122, 0.2); }
        .video-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .video-container::-webkit-scrollbar { display: none; }
        .video-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        video { height: 100%; width: 100%; object-fit: cover; }
        .ionic-bar { width: 100px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .ionic-progress { height: 100%; background: var(--pink); width: 0%; box-shadow: 0 0 10px var(--pink); }
        .fab-btn { background: var(--pink); box-shadow: 0 0 20px rgba(255, 0, 122, 0.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="absolute top-0 w-full z-50 pt-8 flex flex-col items-center pointer-events-none">
        <h1 class="text-3xl font-black text-pink-500 pink-glow uppercase">PINK VIBE</h1>
        <span class="text-[10px] font-bold text-white/40 tracking-widest">إنتاج الموقع</span>
        <div class="ionic-bar"><div id="mainProgress" class="ionic-progress"></div></div>
    </div>

    <div id="feed" class="video-container">
        </div>

    <div class="absolute bottom-6 left-8 right-8 h-16 glass rounded-3xl flex items-center justify-around z-50">
        <button onclick="showTab('home')" class="text-pink-500">🏠</button>
        <button onclick="document.getElementById('uploadModal').classList.remove('hidden')" class="fab-btn w-12 h-12 rounded-full -mt-10 flex items-center justify-center text-white text-2xl font-bold">+</button>
        <button onclick="showTab('msgs')" class="text-white/40">💬</button>
    </div>

    <div id="uploadModal" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-md hidden flex items-center justify-center p-6">
        <div class="glass w-full p-8 rounded-[40px] text-center">
            <h2 class="text-xl font-black text-pink-500 mb-6">نقطة التحميل</h2>
            <input type="file" id="videoFile" accept="video/*" class="mb-6 text-xs">
            <button onclick="handleUpload()" class="w-full bg-pink-600 py-4 rounded-2xl font-black shadow-lg">بدء الرفع</button>
            <button onclick="document.getElementById('uploadModal').classList.add('hidden')" class="mt-4 text-white/20 text-xs">إلغاء</button>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://forg-c693e-default-rtdb.firebaseio.com/videos.json";
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dfscughol/video/upload";
        const PRESET = "update_vk";
        const AD_A = "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c";
        const AD_B = "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e";

        async function loadFeed() {
            try {
                const res = await fetch(FIREBASE_URL);
                const data = await res.json();
                const feed = document.getElementById('feed');
                feed.innerHTML = '';
                
                Object.values(data).reverse().forEach(v => {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <video src="${v.url}" loop playsinline onclick="this.paused?this.play():this.pause()" ontimeupdate="updateBar(this)"></video>
                        <div class="absolute right-4 bottom-32 flex flex-col gap-6">
                            <button onclick="window.open('${AD_A}')" class="w-12 h-12 glass rounded-full flex items-center justify-center">❤️</button>
                            <button onclick="showTab('msgs')" class="w-12 h-12 glass rounded-full flex items-center justify-center">💬</button>
                            <button onclick="window.open('${AD_A}')" class="w-12 h-12 glass rounded-full flex items-center justify-center">🔗</button>
                        </div>
                    `;
                    feed.appendChild(card);
                });
            } catch (e) { console.error("Error loading feed"); }
        }

        function updateBar(video) {
            const progress = (video.currentTime / video.duration) * 100;
            document.getElementById('mainProgress').style.width = progress + '%';
        }

        function showTab(tab) {
            if(tab === 'msgs') {
                window.open(AD_B, '_blank');
                alert("تم توجيهك لقسم الرسائل الخاص بالتعليقات");
            } else {
                location.reload();
            }
        }

        async function handleUpload() {
            const file = document.getElementById('videoFile').files[0];
            if(!file) return alert("اختر فيديو");
            
            const btn = event.target;
            btn.innerText = "جاري الرفع...";
            btn.disabled = true;

            const fd = new FormData();
            fd.append("file", file);
            fd.append("upload_preset", PRESET);

            try {
                const cRes = await fetch(CLOUDINARY_URL, { method: "POST", body: fd });
                const cData = await cRes.json();
                
                await fetch(FIREBASE_URL, {
                    method: "POST",
                    body: JSON.stringify({ url: cData.secure_url, time: Date.now() })
                });
                
                location.reload();
            } catch (e) { alert("فشل الرفع"); btn.disabled = false; btn.innerText = "بدء الرفع"; }
        }

        window.onload = loadFeed;
    </script>
</body>
</html>
